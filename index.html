<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공약 확인</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">선출직 공약 확인</p>
        <h1>내 지역 공약, 근거까지 확인하세요</h1>
      </div>
    </header>

    <main class="app">
      <section class="search-panel" aria-labelledby="search-title">
        <div>
          <h2 id="search-title">공직자 찾기</h2>
          <p>이름이나 지역을 입력하면 공약과 이행 상태를 볼 수 있습니다.</p>
        </div>

        <div class="controls">
          <label class="field">
            <span>검색어</span>
            <input id="searchInput" type="search" placeholder="예: 홍길동, 서울 강남구갑" />
          </label>

          <label class="field">
            <span>선거 종류</span>
            <select id="electionFilter">
              <option value="all">전체</option>
            </select>
          </label>
        </div>
      </section>

      <section class="live-panel" aria-labelledby="live-title">
        <div>
          <p class="eyebrow">실시간 조회</p>
          <h2 id="live-title">중앙선관위 공약 가져오기</h2>
          <p>후보자명이나 후보자ID로 공약을 불러와 현재 화면에 임시로 표시합니다.</p>
        </div>

        <form id="liveLookupForm" class="live-form">
          <label class="field">
            <span>후보자명</span>
            <input id="liveCandidateName" type="search" placeholder="예: 진교훈" />
          </label>

          <label class="field compact">
            <span>선거ID</span>
            <input id="liveSgId" type="text" value="20231011" />
          </label>

          <label class="field compact">
            <span>선거종류</span>
            <select id="liveSgTypecode">
              <option value="4">구청장</option>
              <option value="3">시장·도지사</option>
              <option value="11">교육감</option>
              <option value="1">대통령</option>
            </select>
          </label>

          <label class="field compact">
            <span>후보자ID</span>
            <input id="liveCnddtId" type="text" placeholder="선택" />
          </label>

          <button class="lookup-button" type="submit">공약 가져오기</button>
        </form>

        <p id="liveLookupStatus" class="lookup-status">Vercel API와 환경변수 설정 후 사용할 수 있습니다.</p>
      </section>

      <section class="content-grid">
        <section class="results-panel" aria-labelledby="results-title">
          <div class="panel-heading">
            <h2 id="results-title">검색 결과</h2>
            <span id="resultCount" class="count">0명</span>
          </div>
          <div id="resultsList" class="results-list"></div>
        </section>

        <section class="detail-panel" aria-labelledby="detail-title">
          <div id="detailView" class="empty-detail">
            <h2 id="detail-title">공직자를 선택하세요</h2>
            <p>왼쪽 검색 결과에서 인물을 선택하면 공약 목록이 표시됩니다.</p>
          </div>
        </section>
      </section>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
